name: Build & Release

# Triggers:
#   - push of a tag matching v*.*.*  → builds the exe and creates a Release
#   - manual workflow_dispatch        → builds the exe (artifact only, no release)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Install patchright Chromium (bundled into the package)
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          python -m patchright install chromium

      - name: Pre-download Whisper tiny.en model
        shell: pwsh
        run: |
          python -c @"
          from faster_whisper import WhisperModel
          from pathlib import Path
          import shutil
          tmp = Path('assets/whisper_tmp')
          target = Path('assets/whisper_model')
          target.mkdir(parents=True, exist_ok=True)
          WhisperModel('tiny.en', device='cpu', compute_type='int8', download_root=str(tmp))
          # Flatten the snapshot files into target/
          snap = next((p for p in tmp.rglob('model.bin')), None)
          if snap is None:
              raise SystemExit('model.bin not found after download')
          for f in snap.parent.iterdir():
              if f.is_file():
                  shutil.copy2(f, target / f.name)
          print('Model files placed:')
          for f in target.iterdir():
              print(f'  {f.name}  ({f.stat().st_size:,} bytes)')
          "@

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q

      # Bake repo secrets into src/_build_config.py so they end up inside
      # the .exe at PyInstaller time. Tests run *before* this on purpose:
      # tests must pass without _build_config (auth.py falls back gracefully
      # to env vars / defaults), so a fork without the secret can still
      # build a working unauthenticated dev build.
      #
      # If a secret is unset the corresponding line is written as the empty
      # string and auth.py falls back to its hardcoded default. So the
      # workflow stays runnable on PRs and forks without configuration.
      - name: Bake build-time secrets into src/_build_config.py
        shell: pwsh
        env:
          IATA_GOOGLE_CLIENT_ID: ${{ secrets.IATA_GOOGLE_CLIENT_ID }}
          IATA_API_BASE_URL: ${{ secrets.IATA_API_BASE_URL }}
        run: |
          @'
          import os
          cid = os.environ.get("IATA_GOOGLE_CLIENT_ID", "").strip()
          url = os.environ.get("IATA_API_BASE_URL", "").strip()
          body = (
              '"""Auto-generated by CI. Do not edit.\n'
              "\n"
              "Values come from repo secrets and are baked into the .exe at\n"
              "build time. See .github/workflows/build-release.yml.\n"
              '"""\n'
              f"IATA_GOOGLE_CLIENT_ID = {cid!r}\n"
              f"IATA_API_BASE_URL = {url!r}\n"
          )
          with open("src/_build_config.py", "w", encoding="utf-8") as f:
              f.write(body)
          # Echo redacted summary so the build log shows whether secrets
          # made it through, without leaking the actual values.
          print(f"client_id present: {bool(cid)}  ({len(cid)} chars)")
          print(f"api_base_url    : {url!r}")
          '@ | python -

      - name: Build exe with PyInstaller
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: |
          python -m PyInstaller --noconfirm IATACodeValidator.spec

      - name: Verify exe was produced
        shell: pwsh
        run: |
          $exe = "dist\IATACodeValidator.exe"
          if (-not (Test-Path $exe)) { throw "exe not found at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "Built $exe — $([math]::Round($size / 1MB, 1)) MB"

      - name: Write SHA-256 sidecar
        shell: pwsh
        run: |
          $exe = "dist\IATACodeValidator.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          # No trailing newline — consumed verbatim by the backend manifest.
          [System.IO.File]::WriteAllText("$exe.sha256", $hash)
          Write-Host "SHA-256: $hash"

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: IATACodeValidator-${{ github.ref_name }}
          path: |
            dist/IATACodeValidator.exe
            dist/IATACodeValidator.exe.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/IATACodeValidator.exe
            dist/IATACodeValidator.exe.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
